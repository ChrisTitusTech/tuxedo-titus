name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Validate repository
        run: make check

