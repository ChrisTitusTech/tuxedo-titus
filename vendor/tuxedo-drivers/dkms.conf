PACKAGE_NAME="tuxedo-ibp-gen7-drivers"
PACKAGE_VERSION="4.22.2-fedora-ibp7.1"
AUTOINSTALL="yes"

MAKE[0]="make dkms-build KERNELRELEASE=$kernelver"
CLEAN="make dkms-clean KERNELRELEASE=$kernelver"

BUILT_MODULE_NAME[0]="tuxedo_compatibility_check"
BUILT_MODULE_LOCATION[0]="src/tuxedo_compatibility_check"
DEST_MODULE_LOCATION[0]="/updates/dkms"

BUILT_MODULE_NAME[1]="tuxedo_keyboard"
BUILT_MODULE_LOCATION[1]="src"
DEST_MODULE_LOCATION[1]="/updates/dkms"

BUILT_MODULE_NAME[2]="uniwill_wmi"
BUILT_MODULE_LOCATION[2]="src"
DEST_MODULE_LOCATION[2]="/updates/dkms"

BUILT_MODULE_NAME[3]="tuxedo_io"
BUILT_MODULE_LOCATION[3]="src/tuxedo_io"
DEST_MODULE_LOCATION[3]="/updates/dkms"

NO_WEAK_MODULES="yes"
